<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Corner Flip Book</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
</head>
<body>
    <div class="book-container">
        <div class="book" id="book">
            <!-- Cover pages and inner pages -->
            <div class="page cover-cover">
                <img src="images/cover.jpg" alt="Cover">
            </div>
            <div class="page">
                <img src="images/page1.jpg" alt="Page 1">
            </div>
            <div class="page">
                <img src="images/page2.jpg" alt="Page 2">
            </div>
            <div class="page">
                <img src="images/page3.jpg" alt="Page 3">
            </div>
            <div class="page">
                <img src="images/page4.jpg" alt="Page 4">
            </div>
            <div class="page cover-cover">
                <img src="images/back.jpg" alt="Back Cover">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
